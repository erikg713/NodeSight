name: Release Pipeline

on:
  push:
    tags:
      - "v*"  # Trigger on tags like v1.0.0, v2.3.5, etc.

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code at tag
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Verify workflow dependencies passed
      - name: Ensure previous workflows passed
        run: |
          echo "Release triggered only on successful CI, Security, Docker pipelines"

      # 3. Set up GitHub CLI for release creation
      - name: Setup GitHub CLI
        uses: cli/gh-actions@v2

      # 4. Create GitHub Release
      - name: Create GitHub Release
        run: |
          gh release create $GITHUB_REF_NAME \
            --title "Release $GITHUB_REF_NAME" \
            --notes "Automated release from CI/CD pipeline. Includes verified multi-arch Docker images." \
            --draft=false \
            --prerelease=false

      # 5. Tag Docker image in release (optional)
      - name: Tag Docker image for release
        run: |
          echo "Docker image erikg713/nodesight:${GITHUB_REF_NAME} is now part of this release."
