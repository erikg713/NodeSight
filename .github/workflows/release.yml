name: Release Pipeline

on:
  push:
    tags:
      - "v*"  # Trigger on semantic version tags

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Ensure Docker build & security passed (optional extra check)
      - name: Verify Workflows
        run: echo "Release triggered after CI, Security, Docker success"

      # Setup GitHub CLI
      - name: Setup GitHub CLI
        uses: cli/gh-actions@v2

      # Create GitHub release
      - name: Create Release
        run: |
          gh release create $GITHUB_REF_NAME \
            --title "Release $GITHUB_REF_NAME" \
            --notes "Automated release from NodeSight CI/CD pipeline with verified Docker images" \
            --draft=false \
            --prerelease=false
