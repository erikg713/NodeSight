name: Security Enforcement

on:
  workflow_run:
    workflows: ["CI & Code Enforcement"]
    types:
      - completed

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Repository filesystem scan
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1

      # Docker image scan (requires previous image build)
      - name: Trivy Docker Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: erikg713/nodesight:latest
          severity: CRITICAL,HIGH
          exit-code: 1

      # Sentenial-X pattern enforcement
      - name: Sentenial-X Code Policy Check
        run: |
          python scripts/sentenial_x_policy_check.py || exit 1
